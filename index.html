<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>⚡ Grammar Quest – 72 Levels</title>

    <!-- SEO -->
    <meta name="description" content="Master English grammar with 72 epic levels! From Alphabet to Advanced syntax. Challenge yourself with timed questions and track your progress." />
    <meta name="keywords" content="English Grammar Game, Grammar Quest, Learn Grammar, 72 Levels, Timed Quiz, Tenses, Parts of Speech" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://grammarquest.io/" />
    <meta property="og:title" content="⚡ Grammar Quest – 72 Levels of English Mastery" />
    <meta property="og:description" content="Battle through 72 grammar levels with timed questions. Track your scores and become a grammar champion!" />
    <meta name="theme-color" content="#0d0b1a" />

    <!-- Firebase SDK (Compat) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div id="app">

        <!-- ========== LOGIN SCREEN ========== -->
        <div id="loginScreen" class="screen active">
            <div class="login-header">
                <div class="logo">⚡ Grammar Quest</div>
                <div class="sub">72 Levels · <span>Prove Your Skills</span></div>
            </div>
            <div id="authError" class="error-msg"></div>
            <form id="authForm" class="auth-form">
                <div>
                    <label for="authEmail">Email</label>
                    <input type="email" id="authEmail" placeholder="you@example.com" required />
                </div>
                <div>
                    <label for="authPassword">Password</label>
                    <input type="password" id="authPassword" placeholder="••••••••" required minlength="6" />
                </div>
                <button type="submit" id="authSubmitBtn" class="btn neon-btn">Sign In</button>
            </form>
            <div class="auth-toggle">
                <span id="toggleText">Don't have an account?</span>
                <button id="toggleAuthMode">Create one</button>
            </div>
            <div class="footer-credit">🔒 Secured with Firebase</div>
        </div>

        <!-- ========== DASHBOARD ========== -->
        <div id="dashboardScreen" class="screen">
            <div class="dash-header">
                <h2>🏆 Dashboard</h2>
                <div class="user-email" id="dashUserEmail">user@email.com</div>
                <button id="logoutBtn" class="logout-btn">✕</button>
            </div>

            <!-- Stats -->
            <div class="stats-grid">
                <div class="stat-card"><div class="label">Levels Done</div><div class="value" id="statLevels">0</div></div>
                <div class="stat-card"><div class="label">Average Score</div><div class="value gold" id="statAvg">0%</div></div>
                <div class="stat-card"><div class="label">Total Marks</div><div class="value green" id="statMarks">0</div></div>
                <div class="stat-card"><div class="label">Next Level</div><div class="value" id="statNext">1</div></div>
            </div>

            <!-- Improvement -->
            <div class="improve-section">
                <h4>📌 Areas to improve</h4>
                <p id="improveText">Complete more levels to get insights.</p>
            </div>

            <!-- Actions -->
            <div class="dash-actions">
                <button id="startAssessmentBtn" class="btn neon-btn">▶ Start Quest</button>
                <button id="resetProgressBtn" class="btn btn-secondary">↺ Reset</button>
            </div>

            <!-- ===== NEW: All Levels Grid ===== -->
            <div class="levels-section">
                <h3>📚 All Levels</h3>
                <div class="levels-grid" id="levelsGrid"></div>
            </div>
        </div>

        <!-- ========== ASSESSMENT ========== -->
        <div id="assessmentScreen" class="screen">
            <!-- Top bar -->
            <div class="game-top-bar">
                <span class="level-badge" id="levelBadge">Level 1</span>
                <div class="game-stats">
                    <span class="stat-item" id="scoreDisplay">0</span>
                    <span class="stat-item timer" id="timerDisplay">15s</span>
                </div>
            </div>

            <!-- Progress -->
            <div class="progress-bar"><div class="fill" id="progressFill"></div></div>

            <!-- Question -->
            <div class="question-text" id="questionText">Loading…</div>
            <div class="options-grid" id="optionsContainer"></div>

            <!-- Feedback & Next -->
            <div id="assessmentFeedback" class="feedback"></div>
            <button id="nextQuestionBtn" class="btn neon-btn" style="display:none;">Next →</button>

            <!-- Result box -->
            <div id="resultContainer" class="result-box" style="display:none;">
                <div class="score" id="resultScore">0%</div>
                <div class="detail" id="resultDetail">Great job!</div>
                <button id="finishAssessmentBtn" class="btn neon-btn">📊 Dashboard</button>
            </div>
        </div>

    </div>

    <!-- Firebase Config -->
    <script src="firebase/firebase-config.js"></script>
    <!-- App Logic -->
    <script src="firebase/js/app.js"></script>
</body>
</html>
